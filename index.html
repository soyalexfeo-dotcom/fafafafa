<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación de Envío Express - Kiosco Papelería</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbf7 0%, #f5f0e6 100%);
            --primary-color: #4a0e17; /* Guinda del logotipo */
            --secondary-color: #8b1e2f; /* Rojo del logotipo */
            --whatsapp-green: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            --gmail-blue: linear-gradient(135deg, #2072F3 0%, #124cb1 100%);
            --text-dark: #2d2d2d;
            --text-light: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            padding: 20px;
        }

        /* Contenedor principal: Se adapta a PC y Móvil */
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            max-width: 450px; /* Tamaño ideal tipo app en PC */
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(74, 14, 23, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Área del Logotipo */
        .logo-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .logo-img {
            max-width: 160px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        /* Títulos e Instrucciones */
        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p.tagline {
            font-size: 1rem;
            color: #666;
            margin-bottom: 35px;
            line-height: 1.5;
            font-weight: 600;
        }

        /* Estilo de los Botones de Acción */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            margin-bottom: 20px;
            border: none;
            border-radius: 20px;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-light);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .btn:active {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        /* Botón WhatsApp */
        .btn-whatsapp {
            background: var(--whatsapp-green);
        }
        
        /* Botón Correo */
        .btn-email {
            background: var(--gmail-blue);
        }

        .btn svg {
            width: 28px;
            height: 28px;
            margin-right: 15px;
            fill: currentColor;
        }

        /* Información de soporte/ayuda visual */
        .footer-note {
            font-size: 0.85rem;
            color: #888;
            margin-top: 25px;
            font-weight: 400;
        }

        /* Notificación flotante (Toast) */
        .toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #333333;
            color: #fff;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            bottom: 40px;
        }

        /* Ajustes para pantallas grandes (PC) */
        @media (min-width: 768px) {
            .container {
                padding: 50px 40px;
            }
            .btn:hover {
                transform: translateY(-3px);
                box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
            }
            .btn:hover:active {
                transform: translateY(-1px);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="image_483c86.png" alt="Kiosco Papelería" class="logo-img">
        </div>

        <h1>Estación de Impresión</h1>
        <p class="tagline">Envía tus tareas o documentos al instante y sin cables.</p>

        <a id="btnWhatsapp" href="#" class="btn btn-whatsapp">
            <svg viewBox="0 0 24 24">
                <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.516 2.266 2.27 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.503-5.727-1.455L0 24zm6.59-4.846c1.665.988 3.311 1.554 5.352 1.556 5.466 0 9.911-4.444 9.914-9.908.002-2.648-1.021-5.138-2.884-7.001C17.168 1.936 14.68 1.114 12.01 1.114c-5.47 0-9.914 4.444-9.917 9.91 0 2.074.565 3.734 1.588 5.41l-.99 3.616 3.716-.975zM17.486 14.4c-.3-.149-1.772-.874-2.045-.974-.273-.1-.472-.149-.67.149-.198.3-.769.974-.943 1.173-.173.198-.347.223-.647.074-.3-.149-1.265-.466-2.41-1.487-.893-.795-1.496-1.777-1.671-2.075-.173-.3-.018-.462.13-.61.134-.133.3-.347.45-.52.149-.174.198-.298.298-.497.1-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.772-.72 2.02-1.412.247-.694.247-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
            </svg>
            Enviar a WhatsApp
        </a>

        <button id="btnEmail" class="btn btn-email">
            <svg viewBox="0 0 24 24">
                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            Copiar Correo y Abrir Mail
        </button>

        <p class="footer-note">Kiosco Papelería © 2026</p>
    </div>

    <div id="toast" class="toast">
        ¡Correo copiado! Abriendo aplicación...
    </div>

    <script>
        // --- CONFIGURACIÓN DE DATOS DEL NEGOCIO ---
        const CONFIG = {
            telefono: "523342751521", // Formato internacional sin espacios ni el signo +
            correo: "kiosco.papeleria.jcv@gmail.com", // Cambia esto por el correo real de la papelería
            mensajeWhatsApp: "Hola, quiero imprimir estos archivos. Aquí los adjunto:"
        };

        // Asignación dinámica de WhatsApp al cargar la página
        document.addEventListener("DOMContentLoaded", () => {
            const btnWhastapp = document.getElementById("btnWhatsapp");
            const mensajeCodificado = encodeURIComponent(CONFIG.mensajeWhatsApp);
            btnWhastapp.href = `https://wa.me/${CONFIG.telefono}?text=${mensajeCodificado}`;
        });

        // Lógica del botón de Correo Electrónico
        document.getElementById("btnEmail").addEventListener("click", () => {
            const correo = CONFIG.correo;

            // Intentar copiar al portapapeles usando la API moderna
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(correo)
                    .then(() => procesarSalidaCorreo(correo))
                    .catch(err => fallbackCopiar(correo));
            } else {
                fallbackCopiar(correo);
            }
        });

        // Función auxiliar para mostrar la alerta y abrir la app de mail
        function procesarSalidaCorreo(correo) {
            const toast = document.getElementById("toast");
            
            // Mostrar notificación flotante
            toast.classList.add("show");

            // Ocultar notificación y redirigir después de 1.2 segundos
            setTimeout(() => {
                toast.classList.remove("show");
                // Intenta abrir el gestor de correos nativo (Gmail, Outlook, etc.)
                window.location.href = `mailto:${correo}`;
            }, 1200);
        }

        // Método de respaldo por si el navegador bloquea la API moderna en conexiones no seguras (HTTP de prueba)
        function fallbackCopiar(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";  // Evitar scroll
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                procesarSalidaCorreo(text);
            } catch (err) {
                alert("No se pudo copiar automáticamente. El correo es: " + text);
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
